<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tamale Daa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #0a7;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

input, select, button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
}

button {
  background: #0a7;
  color: white;
  border: none;
  cursor: pointer;
}

.categories-chips {
  display: flex;
  overflow-x: auto;
  gap: 8px;
  margin-bottom: 15px;
}

.chip {
  padding: 8px 12px;
  background: #ddd;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
}

.chip.active {
  background: #0a7;
  color: white;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
}
</style>

</head>

<body>

<header>
  <h2>Tamale Daa</h2>
</header>

<div class="container">

<!-- LOGIN -->

<div id="loginSection">
  <h3>Admin Login</h3>
  <input type="password" id="adminPass" placeholder="Enter admin password">
  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->

<div id="app" style="display:none;">

<h3>Register Business</h3>

<input id="shop-name" placeholder="Business Name">

<select id="shop-category"></select>

<select id="shop-subcategory"></select>

<input id="shop-location" placeholder="GPS Address / Location">

<button onclick="addShop()">Add Business</button>

<hr>

<div class="categories-chips" id="categoryChips"></div>

<div id="listings"></div>

</div>

</div>

<script>

// 🔐 SIMPLE ADMIN LOGIN
function login() {
  const pass = document.getElementById("adminPass").value;
  if (pass === "admin123") {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("app").style.display = "block";
    init();
  } else {
    alert("Wrong password");
  }
}

// 📂 CATEGORY SYSTEM
const SUBCATEGORY_MAP = {
  "Commerce": ["Clothing & Fashion","Electronics & Gadgets","Phones & Accessories","Shoes & Bags","Cosmetics","Furniture","Building Materials"],
  "Food": ["Restaurants","Street Food","Chop Bars","Bakeries","Cold Stores","Catering","Cafés"],
  "Services": ["Tailoring","Barbering","Mechanics","Electricians","Plumbing","Cleaning","IT Services"],
  "Agriculture": ["Grains","Livestock","Vegetables","Fertilizers","Farm Tools","Shea Butter"],
  "Transport": ["Okada","Taxi","Delivery","Cargo","Car Rentals"],
  "Hotels": ["Guest Houses","Hotels","Apartments","Lodges"],
  "Health": ["Clinics","Pharmacies","Herbal","Fitness","Spa"],
  "Education": ["Schools","Tutors","Training","Driving Schools"],
  "Finance": ["MoMo Agents","Banks","Microfinance","Insurance"],
  "Events": ["Event Planners","Photographers","DJs","Rentals"],
  "Energy": ["Solar","Fuel Stations","Generators","Water"]
};

let shops = JSON.parse(localStorage.getItem("shops") || "[]");

// 🚀 INIT
function init() {
  renderCategoryDropdown();
  renderCategoryChips();
  renderListings();
}

// 🎯 CATEGORY DROPDOWN
function renderCategoryDropdown() {
  const catSelect = document.getElementById("shop-category");
  catSelect.innerHTML = Object.keys(SUBCATEGORY_MAP)
    .map(c => `<option>${c}</option>`).join("");

  updateSubcategories();
  catSelect.onchange = updateSubcategories;
}

function updateSubcategories() {
  const cat = document.getElementById("shop-category").value;
  const subSelect = document.getElementById("shop-subcategory");

  subSelect.innerHTML = SUBCATEGORY_MAP[cat]
    .map(s => `<option>${s}</option>`).join("");
}

// ➕ ADD SHOP
function addShop() {
  const name = document.getElementById("shop-name").value;
  const category = document.getElementById("shop-category").value;
  const subcategory = document.getElementById("shop-subcategory").value;
  const location = document.getElementById("shop-location").value;

  if (!name) return alert("Enter business name");

  const shop = { name, category, subcategory, location };

  shops.push(shop);
  localStorage.setItem("shops", JSON.stringify(shops));

  renderListings();
}

// 🧾 RENDER LISTINGS
function renderListings(filter = "All") {
  const container = document.getElementById("listings");

  const filtered = filter === "All"
    ? shops
    : shops.filter(s => s.category === filter);

  container.innerHTML = filtered.map(s => `
    <div class="card">
      <b>${s.name}</b><br>
      ${s.category} - ${s.subcategory}<br>
      📍 ${s.location}
    </div>
  `).join("");
}

// 🧠 CATEGORY CHIPS AUTO-GENERATION
function renderCategoryChips() {
  const container = document.getElementById("categoryChips");
  const categories = ["All", ...Object.keys(SUBCATEGORY_MAP)];

  container.innerHTML = categories.map(cat => `
    <div class="chip ${cat==='All'?'active':''}" onclick="filterCategory('${cat}', this)">
      ${cat}
    </div>
  `).join("");
}

// 🎯 FILTER
function filterCategory(cat, el) {
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderListings(cat);
}

</script>

</body>
</html>
